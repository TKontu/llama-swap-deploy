# llama-swap PAIRS config (GENERATED by gen_pairs_config.py — do not hand-edit).
# Each pairNN is a co-load group: two single-card models, one per 3090, serving
# concurrently. Callsign = pairNN.<model> (roles are assigned by the consuming
# system; split on the FIRST '.' to get the pair id). Only one pair (or one solo
# model) is resident at a time; requesting another swaps it in.
# Regenerate: python3 gen_pairs_config.py > config.pairs.yaml

healthCheckTimeout: 900
logLevel: info

