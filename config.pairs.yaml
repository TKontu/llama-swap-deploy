    cmd: |
      docker run --rm --name ${MODEL_ID}
      -e HUGGING_FACE_HUB_TOKEN=${env.HF_TOKEN}
      -v /models/hf-cache:/root/.cache/huggingface
      -p ${PORT}:8000
      --gpus '"device=GPU-a8c640ca-4d44-440b-5caf-28eca88ea7c1"'
      vllm/vllm-openai:v0.25.1
      --model cyankiwi/gemma-4-26B-A4B-it-qat-AWQ-INT4
      --served-model-name ${MODEL_ID}
      --tensor-parallel-size 1 --gpu-memory-utilization 0.9
