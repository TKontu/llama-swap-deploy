# Concurrency ----------------------------------------------------------------
swap:
  use: group
  group:
    groups:
      # Keep the 35B and the small model loaded together, and never let another
      # model's load evict them.
      coload:
        swap: false
        exclusive: false
        persistent: true
        members:
          - "Qwen3.6-35B-A3B"
          - "gemma-4-E4B"
      # All other models default to on-demand swapping (one at a time) unless you
      # add them to their own group here.
