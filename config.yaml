# llama-swap configuration for the `inference` host.
# Schema: https://raw.githubusercontent.com/mostlygeek/llama-swap/refs/heads/main/config-schema.json
#
# Ported from the old vLLM-gateway config (see vllm_refs/, kept locally). The gateway packed
# many models per card in "budget mode"; llama-swap instead SWAPS models (one at a time)
# unless grouped, so each solo model owns its card(s) while loaded and can take a high
# --gpu-memory-utilization. Sizing is anchored to the gateway's measured footprints.
#
# NOTE: commands are INLINED (no reusable macros). An earlier version used a ${vllm-run}
# macro that itself contained the automatic ${PORT}/${MODEL_ID} macros; the llama-swap
# build in the unified-cuda image did not expand that nesting and rejected the config with
# "proxy uses ${PORT} but cmd does not". Only the automatic macros (${PORT}, ${MODEL_ID},
# ${env.HF_TOKEN}) are used, directly in each cmd — the pattern llama-swap documents.
#
# Conventions:
#   - vLLM models run as sibling Docker containers (llama-swap has the docker CLI + socket).
#   - ${PORT} is auto-assigned by llama-swap; published as ${PORT}:8000 and proxied to it.
#   - GPUs pinned by UUID (indices reorder across reboots):
#       3090 #0  GPU-a8c640ca-4d44-440b-5caf-28eca88ea7c1   (24 GB)
#       A2000    GPU-690062e6-be81-ab00-ebd3-7181cafcea4a   (12 GB)
#       3090 #2  GPU-094f1ca3-2155-7b04-b5aa-4abae3b5ffeb   (24 GB)
#   - --quantization is omitted: vLLM auto-detects AWQ/INT4 from each repo's config.json.
#   - `kv_reservation_seqs` from the old config had no vLLM equivalent (budget-mode packing
#     knob) and is dropped; solo models get the whole card.
#   - 262144 / 1048576 / 256000-token contexts are marked VALIDATE: confirm cold-start fit.

healthCheckTimeout: 900        # seconds to wait for a cold-starting model's /health
logLevel: info

models:

  # ======================= Qwen 3.6 35B A3B (AWQ 4-bit) ========================
  # Full-context profile: TP=2 across both 3090s. Measured ~0.63/card at 131072 ctx.
  "Qwen3.6-35B-A3B-AWQ-4bit":
    name: "Qwen3.6 35B A3B — 131k (AWQ 4-bit, TP2)"
    cmd: |
      docker run --rm --name ${MODEL_ID}
      -e HUGGING_FACE_HUB_TOKEN=${env.HF_TOKEN}
      -v /models/hf-cache:/root/.cache/huggingface
      -p ${PORT}:8000
      --gpus '"device=GPU-a8c640ca-4d44-440b-5caf-28eca88ea7c1,GPU-094f1ca3-2155-7b04-b5aa-4abae3b5ffeb"'
      vllm/vllm-openai:v0.25.1
      --model cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
      --tensor-parallel-size 2 --gpu-memory-utilization 0.90
      --max-model-len 131072 --max-num-seqs 1
      --port 8000
    cmdStop: docker stop ${MODEL_ID}
    proxy: http://127.0.0.1:${PORT}
    ttl: 3600
    # Production omitted --enforce-eager here; add it (as on the 16k profile) if the Xid 31
    # MMU fault recurs (see ARCHITECTURE → known issues).
    filters:
      setParams:
        chat_template_kwargs:
          enable_thinking: false

  # 16k / 8-seq co-load profile: hand-sized to co-reside with a small model on one 3090
  # (see the `coload` group). util 0.58 → ~14 GB/card (measured ~13.8 GB).
  "Qwen3.6-35B-A3B-AWQ-4bit_16k_8seqs":
    name: "Qwen3.6 35B A3B — 16k co-load (AWQ 4-bit, TP2)"
