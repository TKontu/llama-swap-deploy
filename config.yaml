  # ======================= Ternary-Bonsai 27B (GGUF) — SPECIAL CASE ===========
  # Hybrid-attention + multimodal + ternary quant, built for a PrismML fork of llama.cpp.
  # vLLM 0.25.1 CANNOT serve it. PLACEHOLDER: replace <prismml-llamacpp> with the fork image
  # and confirm the server flags. The config still loads with the placeholder — only
  # *requesting* this model fails until the image is set.
  "Ternary-Bonsai-27B":
    name: "Ternary Bonsai 27B (GGUF, llama.cpp PrismML fork)"
    cmd: |
      docker run --rm --name ${MODEL_ID}
      --gpus '"device=GPU-690062e6-be81-ab00-ebd3-7181cafcea4a"'
      -v /models/hf-cache:/root/.cache/huggingface
      -p ${PORT}:8080
      <prismml-llamacpp>
      -m /root/.cache/huggingface/models--prism-ml--Ternary-Bonsai-27B-gguf/snapshots/*/Ternary-Bonsai-27B-dspark-bf16.gguf
      --host 0.0.0.0 --port 8080 -ngl 99 -c 16384
    cmdStop: docker stop ${MODEL_ID}
    proxy: http://127.0.0.1:${PORT}
    checkEndpoint: /health
    ttl: 600
    # Old config carried vLLM-style tokenizer args (--tokenizer / --hf-config-path
    # Qwen/Qwen3.6-27B). Map to the fork's equivalents once the image is known.
    filters:
      setParams:
        chat_template_kwargs:
          enable_thinking: false

# Concurrency ----------------------------------------------------------------
# `groups` is a TOP-LEVEL key. Any model NOT in a group is on-demand and swaps normally
# (one at a time): loading a model unloads the current one, so each solo model owns its
# card(s). The `coload` group keeps the 35B (16k profile) + a small Gemma resident TOGETHER
# on the two 3090s. Requesting either member loads both. On shared 3090 #0 the utils sum to
# 0.58 (35B rank) + 0.30 (Gemma) = 0.88 < ~0.90.
groups:
  coload:
    swap: false          # members stay co-resident (no swapping among them)
    exclusive: true      # loading this pair unloads other models (and vice versa)
    persistent: false    # evictable — do NOT set true, or the other 13 models can never load
    members:
      - "Qwen3.6-35B-A3B-AWQ-4bit_16k_8seqs"
      - "gemma-4-E4B-it-qat-AWQ-INT4-shortkv"
