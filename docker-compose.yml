# llama-swap stack for the `inference` host (deploy via Portainer, GitOps).
#
# - image: → Portainer CANNOT build from a Git repository stack, so we run a
#   PRE-BUILT image from GHCR. It is built & pushed by .github/workflows/build-and-push.yml
#   on every push that touches the Dockerfile. Set LLAMA_SWAP_IMAGE as a stack env var
#   (e.g. ghcr.io/<owner>/llama-swap-deploy:latest). See README → "Deploy with Portainer".
# - network_mode: host → llama-swap serves on :9292 and reaches vLLM sibling
#   containers at 127.0.0.1:<PORT> (their published ports).
# - /var/run/docker.sock → lets llama-swap spawn vLLM containers (DooD).
# - runtime: nvidia → GPUs for any bundled llama.cpp child processes.

services:
  llama-swap:
    # Pre-built image (see workflow above). Defaults to this repo's GHCR package;
    # override with the LLAMA_SWAP_IMAGE stack env var to pin a :sha tag or a fork.
    image: ${LLAMA_SWAP_IMAGE:-ghcr.io/tkontu/llama-swap-deploy:latest}
    # For LOCAL development only (Portainer ignores this for Git stacks):
    #   docker compose build && docker compose up
    # build: .
    container_name: llama-swap
    restart: unless-stopped
    network_mode: host
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yaml:/etc/llama-swap/config/config.yaml:ro
      - /models/hf-cache:/root/.cache/huggingface
    command:
      - --config
      - /etc/llama-swap/config/config.yaml
      - --listen
      - 0.0.0.0:9292
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9292/health"]
      interval: 30s
      timeout: 5s
      retries: 3
