name: bonsai-image

# Builds the PrismML llama.cpp fork image (Ternary-Bonsai-27B runtime) and pushes
# it to GHCR. This is a CUDA compile, so it only runs when its own files change or
# on manual dispatch — NOT on every push.

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.bonsai"
      - "docker/bonsai-serve.sh"
      - ".github/workflows/bonsai-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bonsai-llama   # separate package from the main image

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    steps:
      # The CUDA build produces GBs of object files; the runner's / is only ~14 GB.
      # Free extra space AND move Docker's storage to the large /mnt volume (~70 GB)
      # so buildkit doesn't fill / mid-build (the earlier run got killed uncleanly).
      - name: Maximize build disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
                      /usr/local/lib/android /opt/hostedtoolcache /usr/share/swift \
                      /usr/local/share/boost /usr/lib/jvm /usr/share/miniconda || true
          sudo swapoff -a || true
          sudo systemctl stop docker docker.socket || true
          sudo mkdir -p /mnt/docker
          echo '{"data-root":"/mnt/docker"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl start docker
          echo "--- disk ---"; df -h / /mnt; docker info | grep -i "docker root" || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        # docker-container driver is required for the GHA layer cache (cache-to/from).
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bonsai
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Bonsai image pushed :evergreen_tree:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" | tr ' ' '\n' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Make this package public too, then it's referenced by config.yaml." >> "$GITHUB_STEP_SUMMARY"
