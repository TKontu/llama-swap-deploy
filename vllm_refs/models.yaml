      max_model_len: 16384
      max_num_seqs: 32
      kv_reservation_seqs: 6
      tensor_parallel_size: 2
      extra_args: ["--enforce-eager"]
      request_defaults:
        chat_template_kwargs:
          enable_thinking: false
    Qwen3.6-27B-AWQ-INT4:
