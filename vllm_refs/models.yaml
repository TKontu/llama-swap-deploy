  pools:
    mypool:
      - GPU-a8c640ca-4d44-440b-5caf-28eca88ea7c1
      - GPU-094f1ca3-2155-7b04-b5aa-4abae3b5ffeb

  defaults:
    pool: mypool
    max_model_len: 32768            # budget mode REQUIRES > 0 on every model (was 0 -> would refuse to st>
    max_num_seqs: 8                 # bounds KV per model -> controls how tightly models pack
    inactivity_timeout: 21600        # unload after 30 min idle (0 = never)
    # gpu_memory_utilization is NOT the cap in budget mode — GPU_BUDGET_FRACTION (in .env) is.
    # It only sets the launch util for models the gateway can't auto-size; 0.90 is a safe default.
    gpu_memory_utilization: 0.95

  models:
    Qwythos-9B-Claude-Mythos-5-1M:
      repo: empero-ai/Qwythos-9B-Claude-Mythos-5-1M
      max_model_len: 256000
      max_num_seqs: 1
      kv_reservation_seqs: 1
      tensor_parallel_size: 2
    qwen3.5-9b:
      repo: cyankiwi/Qwen3.5-9B-AWQ-4bit
      max_model_len: 16384
      max_num_seqs: 2
    Qwen3.5-4B-AWQ-4bit-shortkv:
      repo: cyankiwi/Qwen3.5-4B-AWQ-4bit
      max_model_len: 16384
      max_num_seqs: 32
      kv_reservation_seqs: 6
      tensor_parallel_size: 2
      extra_args: ["--enforce-eager"]
      request_defaults:
        chat_template_kwargs:
          enable_thinking: false
    Qwen3.6-35B-A3B-AWQ-4bit:
      repo: cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
      max_num_seqs: 1
      max_model_len: 131072
      tensor_parallel_size: 2      # split weights AND KV across both cards
      request_defaults:
        chat_template_kwargs:
          enable_thinking: false
    Qwen3.6-35B-A3B-AWQ-4bit_16k_8seqs:
      repo: cyankiwi/Qwen3.6-35B-A3B-AWQ-4bit
      max_num_seqs: 8
      kv_reservation_seqs: 4
      max_model_len: 16384
      tensor_parallel_size: 2      # split weights AND KV across both cards
      extra_args: ["--enforce-eager"]
      request_defaults:
        chat_template_kwargs:
          enable_thinking: false
    gemma-4-E4B-it-qat-AWQ-INT4-shortkv:
